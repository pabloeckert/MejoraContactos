# CI — Tests & Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Performance budget
        run: bash scripts/perf-check.sh

      - name: Build smoke test
        run: |
          test -f dist/index.html || (echo "ERROR: dist/index.html not found" && exit 1)
          echo "✅ Build OK — dist/ contains $(find dist -type f | wc -l) files"
