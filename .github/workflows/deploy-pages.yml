name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build for GitHub Pages
        run: npm run build
        env:
          BASE_PATH: /MejoraContactos/

      - name: Performance budget
        run: bash scripts/perf-check.sh

      - name: Build smoke test
        run: |
          test -f dist/index.html || (echo "ERROR: dist/index.html not found" && exit 1)
          echo "✅ Build OK — $(find dist -type f | wc -l) files"

      # E2E tests
      - name: Build for E2E (root base)
        run: npm run build:test

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npx playwright test --reporter=list

      # Rebuild with production base path
      - name: Rebuild for production
        run: npm run build
        env:
          BASE_PATH: /MejoraContactos/

      # SPA fallback: copy index.html to 404.html for client-side routing
      - name: SPA fallback (404.html)
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
